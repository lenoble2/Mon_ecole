<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Moyennes, Rangs et Bascule</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        h2 { color: #333; }
        .top-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .filter-container { display: flex; gap: 5px; margin-bottom: 15px; }
        .filter-btn { padding: 8px 15px; cursor: pointer; border: 1px solid #ccc; background-color: #f8f9fa; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f4f4f4; }
        .btn { padding: 10px 20px; color: white; text-decoration: none; border-radius: 5px; cursor: pointer; border: none; }
        input[type="number"], select { width: 60px; padding: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="top-container">
        <h2 id="titre-annee">Moyennes, Rangs et Bascule</h2>
        <select id="annee-select" onchange="changerAnnee()">
            <option value="2030">2030-2031</option>
            <option value="2029">2029-2030</option>
            <option value="2028">2028-2029</option>
            <option value="2027">2027-2028</option>
            <option value="2026">2026-2027</option>
            <option value="2025" selected>2025-2026</option>
            <option value="2024">2024-2025</option>
	    <option value="2023">2023-2024</option>

        </select>
    </div>

    <div class="filter-container">
        <button class="filter-btn" onclick="filtrer('Tous')">Tous</button>
        <button class="filter-btn" onclick="filtrer('CP1')">CP1</button>
        <button class="filter-btn" onclick="filtrer('CP2')">CP2</button>
        <button class="filter-btn" onclick="filtrer('CE1')">CE1</button>
        <button class="filter-btn" onclick="filtrer('CE2')">CE2</button>
        <button class="filter-btn" onclick="filtrer('CM1')">CM1</button>
        <button class="filter-btn" onclick="filtrer('CM2')">CM2</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>N°</th>
                <th>Matricule</th>
                <th style="text-align: left;">Nom</th>
                <th style="text-align: left;">Prénoms</th>
                <th>Date Naiss.</th>
                <th>Sexe</th>
                <th>MG</th>
                <th>Rang</th>
                <th>DFA (A/R)</th>
            </tr>
        </thead>
        <tbody id="tableau-moyennes"></tbody>
    </table>

    <div style="margin-top: 20px;">
        <button onclick="enregistrerModifications()" class="btn" style="background-color: #007bff;">Enregistrer les modifications</button>
        <button onclick="validerBascule()" class="btn" style="background-color: #28a745;">Valider la Bascule</button>
        <a href="accueil.html" class="btn" style="background-color: #6c757d;">Retour</a>
    </div>

<script>
    let listeEleves = [];

    function changerAnnee() {
        const annee = document.getElementById('annee-select').value;
        window.location.href = `moyen.html?annee=${annee}`;
    }

    const urlParams = new URLSearchParams(window.location.search);
    const annee = urlParams.get('annee') || '2025';
    document.getElementById('annee-select').value = annee;

    fetch(`/api/eleves/${annee}`)
        .then(res => res.json())
        .then(data => {
            listeEleves = data;
            afficherTableau(listeEleves);
        });

    function afficherTableau(data) {
        const tbody = document.getElementById('tableau-moyennes');
        tbody.innerHTML = '';
        data.forEach((e, index) => {
            tbody.innerHTML += `
                <tr data-id="${e.matricule}">
                    <td>${index + 1}</td>
                    <td>${e.matricule || ''}</td>
                    <td style="text-align: left;">${e.nom || ''}</td>
                    <td style="text-align: left;">${e.prenoms || ''}</td>
                    <td>${e.date_naissance || ''}</td>
                    <td>${e.sexe || ''}</td>
                    <td><input type="number" step="0.01" class="edit-mg" value="${e.moyenne || '0.00'}"></td>
                    <td><input type="number" class="edit-rang" value="${e.rang || index + 1}"></td>
                    <td>
                        <select class="dfa-select">
                            <option value="">--</option>
                            <option value="A">A</option>
                            <option value="R">R</option>
                        </select>
                    </td>
                </tr>`;
        });
    }

function enregistrerModifications() {
    const lignes = document.querySelectorAll('tbody tr');
    const updates = [];
    lignes.forEach(tr => {
        updates.push({
            matricule: tr.getAttribute('data-id'),
            moyenne: tr.querySelector('.edit-mg').value,
            rang: tr.querySelector('.edit-rang').value
        });
    });

    // On envoie 'annee' (qui est déjà définie dans votre script)
    fetch('/api/update-notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ updates: updates, annee: annee }) 
    }).then(res => res.json())
      .then(data => {
          if(data.success) alert("Notes et Rangs enregistrés pour cette année !");
      });
}




    function validerBascule() {
        const rows = document.querySelectorAll('tbody tr');
        const decisions = [];
        rows.forEach(tr => {
            const select = tr.querySelector('.dfa-select');
            if(select.value) {
                decisions.push({ matricule: tr.getAttribute('data-id'), decision: select.value });
            }
        });
        
        if(decisions.length === 0) return alert("Sélectionnez A ou R pour basculer.");

        if(confirm(`Confirmer le basculement de ${decisions.length} élève(s) ?`)) {
            fetch('/api/basculer-eleves', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ decisions: decisions, annee_source: annee })
            }).then(() => {
                alert("Bascule effectuée !");
                location.reload();
            });
        }
    }

    function filtrer(niveau) {
        if (niveau === 'Tous') afficherTableau(listeEleves);
        else afficherTableau(listeEleves.filter(e => e.niveau === niveau));
    }
</script>
</body>
</html>

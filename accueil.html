<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Scolaire - Accueil</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; padding-bottom: 90px; }

        /* Header */
        header { text-align: center; position: relative; padding-top: 20px; padding-bottom: 20px; margin: -20px -20px 20px -20px; background: linear-gradient(to bottom, #ffffff 60%, #f4f7f6 100%); }
        .logo-armoiries { width: 80px; height: auto; display: block; margin: 0 auto 10px; }
        h1 { color: #2e7d32; margin: 0; font-size: 1.5em; }
        .user-profile { position: absolute; top: 10px; right: 15px; }
        .profile-pic { width: 45px; height: 45px; background-color: #ddd; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        
        /* Grille de menus */
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .menu-card { background: white; padding: 10px 5px; border-radius: 15px; text-decoration: none; color: #333; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .menu-card:hover { transform: scale(1.05); }
        .icon { font-size: 20px; margin-bottom: 5px; display: block; }
        .menu-card span { font-weight: 600; font-size: 0.70em; color: #2e7d32; display: block; }

        /* Bannière Défilante (Slider de 3 photos avec fond blanc) */
        .banner-container { width: 100%; height: 160px; overflow: hidden; border-radius: 15px; margin-bottom: 20px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.2); background: #ffffff; }
	.banner-track { display: flex; width: 300%; animation: slide 17s infinite; }
        .banner-track img { width: 33.33%; height: 160px; object-fit: cover; }
        
        @keyframes slide {
            0% { transform: translateX(0%); }
            33% { transform: translateX(-33.33%); }
            66% { transform: translateX(-66.66%); }
            100% { transform: translateX(0%); }
        }

        /* Barre de navigation bas */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; }
        .nav-item { text-decoration: none; color: #666; display: flex; flex-direction: column; align-items: center; font-size: 11px; }
    </style>
</head>
<body>

    <header>
        <div class="user-profile"><div class="profile-pic"></div></div>
        <img src="Armoiries.jpg" alt="Armoiries" class="logo-armoiries">
        <h1 id="nom-ecole-affiche">Chargement...</h1>
    </header>

    <div class="menu-grid">
        <a href="/annee.html" class="menu-card"><span class="icon">📋</span><span>Élèves</span></a>
        <a href="/ajout_eleve.html" class="menu-card"><span class="icon">➕</span><span>Ajout</span></a>
        <a href="/moyen.html" class="menu-card"><span class="icon">📤</span><span>Moyennes</span></a>
        <a href="#" class="menu-card"><span class="icon">⚙️</span><span>Paramètres</span></a>
        <a href="/prof.html" class="menu-card"><span class="icon"> 👤</span><span>Prof</span></a>
        <a href="/recap.html" class="menu-card"><span class="icon">📚</span><span>Tableau Récapitulatif</span></a>
        <a href="/sansext.html" class="menu-card"><span class="icon">💰</span><span>Sans Extrait</span></a>
        <a href="certi.html" class="menu-card"><span class="icon"> 📊</span><span>Certificat de scolarité</span></a>
    </div>

    <div class="banner-container">
        <div class="banner-track">
	<img src="banniere_finale.jpg" alt="Bannière Officielle">
	<img src="M2.jpg" alt="Photo 2">
	<img src="M3.jpg" alt="Photo 3">
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span>🏠</span><span>Accueil</span></a>
        <a href="/liste.html" class="nav-item"><span>🔍</span><span>Explorer</span></a>
        <a href="#" class="nav-item"><span>🏆</span><span>Classement</span></a>
        <a href="#" class="nav-item"><span>💳</span><span>Portefeuille</span></a>
    </nav>

    <script>
        fetch('/api/nom-ecole')
            .then(res => res.json())
            .then(data => {
                const titreEcole = document.getElementById('nom-ecole-affiche');
                if (titreEcole) titreEcole.innerText = data.nom;
            })
            .catch(err => {
                document.getElementById('nom-ecole-affiche').innerText = "Mon École";
            });
    </script>

</body>
</html>

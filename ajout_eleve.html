<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajout d'un élève</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        section { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        h3 { background-color: #2e7d32; color: white; padding: 5px; margin-top: 0; border-radius: 5px; }
        .form-group { margin-bottom: 10px; }
        label { display: inline-block; width: 180px; font-weight: bold; }
        input { padding: 5px; width: 250px; }
        button { padding: 10px 20px; background-color: #2e7d32; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Ajouter un nouvel élève</h2>

    <form action="/ajouter-eleve" method="POST" enctype="multipart/form-data">

        <section>
            <h3>Identification</h3>
            <div class="form-group"><label>Photo :</label> <input type="file" name="photo" accept="image/*"></div>
            <div class="form-group"><label>Année scolaire :</label> <input type="text" name="annee" value="2025"></div>
            <div class="form-group"><label>Matricule :</label> <input type="text" name="matricule"></div>
            <div class="form-group"><label>Nom :</label> <input type="text" name="nom"></div>
            <div class="form-group"><label>Prénoms :</label> <input type="text" name="prenoms"></div>
            <div class="form-group"><label>Sexe :</label> <input type="text" name="sexe"></div>
            <div class="form-group"><label>Date de naissance :</label>
                <input type="number" name="jour" placeholder="J" style="width: 50px;">
                <input type="text" name="mois" placeholder="Mois" style="width: 80px;">
                <input type="number" name="annee_nais" placeholder="Année" style="width: 80px;">
            </div>
            <div class="form-group"><label>Pays :</label> <input type="text" name="pays"></div>
            <div class="form-group"><label>Localité :</label> <input type="text" name="localite"></div>
            <div class="form-group"><label>Mère :</label> <input type="text" name="mere"></div>
            <div class="form-group"><label>Père :</label> <input type="text" name="pere"></div>
            <div class="form-group"><label>Contact parent :</label> <input type="text" name="contact"></div>
            <div class="form-group"><label>Nationalité :</label> <input type="text" name="nationalite"></div>
        </section>

        <section>
            <h3>Acte de naissance et Résidence</h3>
            <div class="form-group"><label>N° acte de naissance :</label> <input type="text" name="num_acte"></div>
            <div class="form-group"><label>Document (Acte) :</label> <input type="file" name="document"></div>
            <div class="form-group"><label>Date établissement :</label> <input type="text" name="date_etab"></div>
            <div class="form-group"><label>Lieu établissement :</label> <input type="text" name="lieu_etab"></div>
        </section>

        <section>
            <h3>Fréquentation</h3>
            <div class="form-group"><label>École :</label> <input type="text" name="ecole"></div>
            <div class="form-group"><label>Niveau :</label> <input type="text" name="niveau"></div>
        </section>

        <button type="submit">Enregistrer l'élève</button>
        <a href="liste.html" style="margin-left: 10px;">Annuler</a>

    </form>
</body>
</html>
